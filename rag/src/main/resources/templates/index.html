<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Spring AI</title>
    <link rel="stylesheet" href="http://bit.ly/3WJ5ilK" />
    <style>
        #resultQuery {
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <!-- index.html -->
    <h1>Spring AI <small>RAG</small></h1>
    
    <div>
        <div>RAG 정적 데이터</div>
        <div class="space"></div>
        <button type="button" onclick="load()">학습 시키기</button>
        <button type="button" onclick="del()">데이터 삭제하기</button>
    </div>

    <h2>질문</h2>
    <div>
        <input type="text" id="message" name="message" class="full" placeholder="" autofocus>
    </div> 
    <hr>
    <div id="result" class="message"></div>   
    
    <script>
    
        document.getElementById('message').onkeydown = async function() {
        
            if(event.key != "Enter") return;
            
            const response = await fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8;'
                },
                body: new URLSearchParams({ 
                    message: event.target.value
                })
            });
            
            if(response.ok) {
                
                const text = await response.text();
                
                document.getElementById('result').textContent = text;
                
            }
        };
        
        async function load() {
            try {
                const resp = await fetch('/load');    
                document.getElementById('result').textContent = await resp.text();  
            } catch (e) {
                console.log(e);
            }
        }
        
        async function del() {
            try {
                const resp = await fetch('/del');    
                document.getElementById('result').textContent = await resp.text();  
            } catch (e) {
                console.log(e);
            }
        }
        
    </script>
    
</body>
</html>
