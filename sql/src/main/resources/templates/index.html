<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Spring AI</title>
    <link rel="stylesheet" href="http://bit.ly/3WJ5ilK" />
    <style>
        #resultQuery {
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <!-- index.html -->
    <h1>Spring AI <small>Text to SQL</small></h1>
    
    <div class="message" title="DB Scheme">
        <div>유저(tblUser): 아이디, 암호, 이름</div>
        <div>유저상세정보(tblUserInfo): 나이, 주소, 성별</div>
        <div>게시판(tblBoard): 제목, 내용, 작성일</div>
        <div>댓글(tblComment): 댓글, 작성일</div>
        <div>태그(tblTag): 태그</div>
    </div>
    
    <div>
        <input type="text" name="text" id="text" class="full" placeholder="질문을 작성하세요." autofocus>
    </div>
    
    <h2>결과</h2>
    <table id="result"></table>
    
    <div class="message" title="생성된 질의"><pre id="resultQuery"></pre></div>
    
    <script>
        
        document.getElementById('text').onkeydown = async function() {
            
            if(event.key != 'Enter') return;
            
            // 요청
            const response = await fetch('/sql', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({
                    text: event.target.value
                })
            });
            
            if(response.ok){
                
                const data = await response.json();
                //console.log(result);                
                
                if (!data.result || data.result.length === 0) {
                    document.getElementById('result').textContent = '질문에 대한 결과가 없습니다.';
                    return;
                }
                
                const sql = `${data.query}`;
                
                const html = `
                    <thead>
                        <tr>
                            ${Object.keys(data.result[0])
                                .map(key => `<th>${key}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        ${data.result.map(row => `
                            <tr>
                                ${Object.values(row).map(
                                    value => `<td>${value}</td>`
                                ).join('')}
                            </tr>
                        `)}
                    </tbody>
                `;
                
                document.getElementById('resultQuery').textContent = sql;
                document.getElementById('result').innerHTML = html;
                
            } else {
            
                
            
            }
            
        };
        
    </script>
    
</body>
</html>
